<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pressure Vessel Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<h1>Pressure Vessel Thickness Calculator</h1>

<input id="P" placeholder="Pressure (MPa)">
<input id="R" placeholder="Inside Radius (mm)">
<input id="S" placeholder="Allowable Stress (MPa)">
<input id="E" placeholder="Joint Efficiency">
<input id="CA" placeholder="Corrosion Allowance (mm)">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script src="script.js"></script>
</body>
</html>
