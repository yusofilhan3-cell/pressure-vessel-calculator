<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pressure Vessel Thickness Calculator</title>

<style>
body { font-family: Arial; max-width: 450px; margin: auto; padding: 20px; }
input, button { width: 100%; padding: 8px; margin: 6px 0; }
button { background: #0078D4; color: white; border: none; }
</style>
</head>

<body>

<h1>Pressure Vessel Thickness Calculator</h1>

<input id="P" placeholder="Design Pressure (MPa)">
<input id="R" placeholder="Inside Radius (mm)">
<input id="S" placeholder="Allowable Stress (MPa)">
<input id="E" placeholder="Joint Efficiency">
<input id="CA" placeholder="Corrosion Allowance (mm)">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script>
function calculate() {
  const P = parseFloat(document.getElementById("P").value);
  const R = parseFloat(document.getElementById("R").value);
  const S = parseFloat(document.getElementById("S").value);
  const E = parseFloat(document.getElementById("E").value);
  const CA = parseFloat(document.getElementById("CA").value) || 0;

  if (isNaN(P) || isNaN(R) || isNaN(S) || isNaN(E)) {
    result.innerText = "Please enter all required values.";
    return;
  }

  if (S * E <= 0.6 * P) {
    result.innerText = "Invalid input per ASME BPVC limits.";
    return;
  }

  const t = (P * R) / (S * E - 0.6 * P) + CA;
  result.innerText = "Required Thickness = " + t.toFixed(2) + " mm";
}
</script>

</body>
</html>
